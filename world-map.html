<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Map Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #e8edf2;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #map-container {
      width: 100vw;
      height: 100vh;
    }

    #world-map {
      width: 100%;
      height: 100%;
    }

    .country {
      fill: #3a3a3a;
      stroke: #fff;
      stroke-width: 0.5px;
      cursor: pointer;
      transition: fill 0.12s ease;
    }

    .country:hover {
      fill: #3b82f6;
    }

    .country.highlighted {
      fill: #f59e0b;
    }

    .graticule {
      fill: none;
      stroke: #dde6ef;
      stroke-width: 0.4px;
    }

    .sphere {
      fill: #d6e8f5;
    }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.06);
      max-width: 300px;
      min-width: 220px;
      z-index: 200;
      display: none;
      font-size: 13px;
      line-height: 1.55;
    }

    .tt-header {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f1f5f9;
    }

    .tt-flag {
      font-size: 26px;
      line-height: 1;
      flex-shrink: 0;
    }

    .tt-name {
      font-size: 15px;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.2;
    }

    .tt-row {
      display: flex;
      gap: 6px;
      margin-bottom: 5px;
      color: #475569;
    }

    .tt-label {
      font-weight: 600;
      color: #334155;
      white-space: nowrap;
      min-width: 70px;
    }

    .tt-value {
      color: #334155;
    }

    .tt-fact {
      margin-top: 9px;
      padding-top: 9px;
      border-top: 1px solid #f1f5f9;
      color: #64748b;
      font-style: italic;
      font-size: 12px;
      line-height: 1.5;
    }

    .tt-no-data {
      color: #94a3b8;
      font-style: italic;
      text-align: center;
      padding: 6px 0;
    }

    /* ── Search bar ── */
    #search-container {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
    }

    #search-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    #search-icon {
      position: absolute;
      left: 11px;
      font-size: 14px;
      color: #94a3b8;
      pointer-events: none;
      z-index: 1;
    }

    #search {
      background: #fff;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px 10px 36px;
      font-size: 14px;
      width: 230px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.09);
      outline: none;
      color: #0f172a;
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    #search::placeholder { color: #94a3b8; }

    #search:focus {
      border-color: #3b82f6;
      box-shadow: 0 4px 14px rgba(59,130,246,0.18);
    }

    #search.no-match {
      border-color: #f87171;
      box-shadow: 0 4px 14px rgba(248,113,113,0.18);
    }

    /* ── Hint label ── */
    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.88);
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 12px;
      color: #64748b;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      backdrop-filter: blur(6px);
      pointer-events: none;
      transition: opacity 0.3s;
    }

    /* ── Capital dot ── */
    .capital-dot {
      fill: #ef4444;
      stroke: #fff;
      stroke-width: 1.5px;
      pointer-events: none;
      filter: drop-shadow(0 1px 3px rgba(239,68,68,0.5));
    }

    .capital-label {
      font-size: 10px;
      fill: #ef4444;
      font-weight: 600;
      pointer-events: none;
      text-anchor: middle;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      filter: drop-shadow(0 0 2px #fff);
    }
  </style>
</head>

  const svg      = d3.select('#world-map');
  const tooltip  = document.getElementById('tooltip');
  const hint     = document.getElementById('hint');
  const searchEl = document.getElementById('search');

  let width, height, projection, path, g, capitalGroup;
  let currentHighlighted = null;

  function getSize() {
    width  = window.innerWidth;
    height = window.innerHeight;
  }

  function buildProjection() {
    projection = d3.geoNaturalEarth1()
      .scale(Math.min(width / 6.3, height / 3.5))
      .translate([width / 2, height / 2]);
    path = d3.geoPath().projection(projection);
  }

  function init(world) {
    getSize();
    buildProjection();

    svg.selectAll('*').remove();

    // Sphere (ocean background)
    g = svg.append('g');
    g.append('path')
      .datum({type:'Sphere'})
      .attr('class','sphere')
      .attr('d', path);

    // Graticule
    const graticule = d3.geoGraticule()();
    g.append('path')
      .datum(graticule)
      .attr('class','graticule')
      .attr('d', path);

    // Country paths
    const countries = topojson.feature(world, world.objects.countries).features;

    g.selectAll('.country')
      .data(countries)
      .join('path')
        .attr('class','country')
        .attr('id', d => 'c' + d.id)
        .attr('title', d => COUNTRY_DATA[d.id]?.name || 'Unknown')
        .attr('d', path)
        .on('mousemove', onCountryMousemove)
        .on('mouseleave', onCountryMouseleave);

    // Capital dot layer (above countries)
    capitalGroup = g.append('g').attr('id','capital-layer');

    // Search handler
    searchEl.addEventListener('input', onSearch);
    searchEl.addEventListener('keydown', e => {
      if (e.key === 'Escape') { searchEl.value = ''; onSearch(); }
    });

    // Resize
    window.addEventListener('resize', () => {
      getSize(); buildProjection();
      g.selectAll('.country').attr('d', path);
      g.selectAll('.sphere').attr('d', path);
      g.selectAll('.graticule').attr('d', path);
    });
  }

  // ── Tooltip rendering ──────────────────────────────────────
  function showTooltip(data, x, y) {
    if (!data) {
      tooltip.innerHTML = `<div class="tt-no-data">No data available for this territory</div>`;
    } else {
      const flag = toFlag(data.iso2);
      tooltip.innerHTML = `
        <div class="tt-header">
          <span class="tt-flag">${flag}</span>
          <span class="tt-name">${data.name}</span>
        </div>
        <div class="tt-row"><span class="tt-label">Religion</span><span class="tt-value">${data.religion}</span></div>
        <div class="tt-row"><span class="tt-label">Language</span><span class="tt-value">${data.language}</span></div>
        <div class="tt-fact">💡 ${data.fact}</div>
      `;
    }
    tooltip.style.display = 'block';
    positionTooltip(x, y);
  }

  function positionTooltip(x, y) {
    const tt  = tooltip;
    const tw  = tt.offsetWidth  || 280;
    const th  = tt.offsetHeight || 160;
    const pad = 14;
    let left  = x + pad;
    let top   = y - th / 2;
    // Flip horizontal if near right edge
    if (left + tw + pad > width)  left = x - tw - pad;
    // Clamp vertical
    if (top < pad)                top = pad;
    if (top + th + pad > height)  top = height - th - pad;
    tt.style.left = left + 'px';
    tt.style.top  = top  + 'px';
  }

  function hideTooltip() {
    tooltip.style.display = 'none';
  }

  // ── Capital dot ────────────────────────────────────────────
  function showCapitalDot(data) {
    capitalGroup.selectAll('*').remove();
    if (!data?.capital) return;
    const coords = projection([data.capital.lng, data.capital.lat]);
    if (!coords) return;
    capitalGroup.append('circle')
      .attr('class','capital-dot')
      .attr('cx', coords[0])
      .attr('cy', coords[1])
      .attr('r',  4);
    capitalGroup.append('text')
      .attr('class','capital-label')
      .attr('x', coords[0])
      .attr('y', coords[1] - 8)
      .text(data.capital.name);
    capitalGroup.raise();
  }

  function hideCapitalDot() {
    capitalGroup?.selectAll('*').remove();
  }

  // ── Mouse event handlers ───────────────────────────────────
  function onCountryMousemove(event, d) {
    const data = COUNTRY_DATA[d.id] || null;
    const el = d3.select(this);

    // Only highlight if not search-highlighted
    if (!el.classed('highlighted')) {
      el.raise();
    }

    showTooltip(data, event.clientX, event.clientY);
    showCapitalDot(data);

    hint.style.opacity = '0';
  }

  function onCountryMouseleave(event, d) {
    // Don't clear if this was search-highlighted
    const el = d3.select(this);
    hideTooltip();
    if (!el.classed('highlighted')) {
      hideCapitalDot();
    }
    hint.style.opacity = '1';
  }

  // ── Search ─────────────────────────────────────────────────
  function onSearch() {
    const q = searchEl.value.trim().toLowerCase();

    // Clear previous highlight
    if (currentHighlighted) {
      d3.select('#c' + currentHighlighted).classed('highlighted', false);
      currentHighlighted = null;
      hideCapitalDot();
      hideTooltip();
    }

    if (!q) {
      searchEl.classList.remove('no-match');
      return;
    }

    // Find first match
    const match = Object.entries(COUNTRY_DATA).find(([, v]) =>
      v.name.toLowerCase().startsWith(q)
    ) || Object.entries(COUNTRY_DATA).find(([, v]) =>
      v.name.toLowerCase().includes(q)
    );

    if (match) {
      const [id, data] = match;
      searchEl.classList.remove('no-match');
      currentHighlighted = +id;
      const el = d3.select('#c' + id);
      el.classed('highlighted', true).raise();

      // Show capital dot and tooltip for matched country
      showCapitalDot(data);

      // Position tooltip near country centroid
      const pathNode = el.node();
      if (pathNode) {
        const bbox = pathNode.getBoundingClientRect();
        showTooltip(data, bbox.left + bbox.width / 2, bbox.top + bbox.height / 2);
      }
    } else {
      searchEl.classList.add('no-match');
    }
  }

  // ── Load map data ──────────────────────────────────────────
  const TOPO_URL = 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json';

  d3.json(TOPO_URL).then(world => {
    init(world);
  }).catch(err => {
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#64748b;flex-direction:column;gap:12px;">
        <div style="font-size:40px">🌍</div>
        <div style="font-size:18px;font-weight:600;color:#0f172a">Failed to load map</div>
        <div style="font-size:14px">Please check your internet connection and refresh the page.</div>
      </div>`;
  });
  </script>
</body>
</html>
